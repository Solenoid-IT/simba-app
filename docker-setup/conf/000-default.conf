<VirtualHost *:80>
    DocumentRoot /app/web

    ErrorLog /app/storage/logs/apache/error.log
    CustomLog /app/storage/logs/apache/access.log combined

    Protocols h2c http/1.1

    <Directory /app/web>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /app/web/build>
        # Headers for CORS
        Header set Access-Control-Allow-Origin "*"
        Header set Access-Control-Allow-Methods "*"
        Header set Access-Control-Allow-headers "*"
    </Directory>

    <FilesMatch \\.php$>
        SetHandler "proxy:unix:/run/php/php8.3-fpm.sock|fcgi://localhost/"
    </FilesMatch>



    # ReverseProxy (Alert)
    #SSLProxyEngine On
    ProxyPass "/micro/alert" ws://localhost:3001
    ProxyPassReverse "/micro/alert" ws://localhost:3001
</VirtualHost>



<VirtualHost *:443>
    DocumentRoot /app/web

    ErrorLog /app/storage/logs/apache/error.log
    CustomLog /app/storage/logs/apache/access.log combined

    SSLEngine on
    SSLCertificateFile /app/storage/cert/simba.crt
    SSLCertificateKeyFile /app/storage/cert/simba.key

    Protocols h2 http/1.1

    <Directory /app/web>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /app/web/build>
        # Headers for CORS
        Header set Access-Control-Allow-Origin "*"
        Header set Access-Control-Allow-Methods "*"
        Header set Access-Control-Allow-headers "*"
    </Directory>

    <FilesMatch \\.php$>
        SetHandler "proxy:unix:/run/php/php8.3-fpm.sock|fcgi://localhost/"
    </FilesMatch>



    # ReverseProxy (Alert)
    #SSLProxyEngine On
    ProxyPass "/micro/alert" ws://localhost:3001
    ProxyPassReverse "/micro/alert" ws://localhost:3001
</VirtualHost>